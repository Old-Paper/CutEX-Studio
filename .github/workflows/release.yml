name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm package
      - name: Create source archive
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          git archive --format=zip --output="release/CutEX-Studio-$version-source.zip" HEAD
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          gh release view '${{ github.ref_name }}' --json tagName 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload '${{ github.ref_name }}' `
              "release/CutEX-Studio-$version-Windows.exe" `
              "release/CutEX-Studio-$version-source.zip" `
              --clobber
          } else {
            gh release create '${{ github.ref_name }}' `
              "release/CutEX-Studio-$version-Windows.exe" `
              "release/CutEX-Studio-$version-source.zip" `
              --title "CutEX Studio $version" `
              --generate-notes
          }
